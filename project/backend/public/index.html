<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摄像头识别 + YOLO ONNX + 状态判断</title>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body data-experiment-name="defaultExperiment">
    <div class="page">
      <div class="left">
        <h2>摄像头实时识别</h2>
        <div class="viewer">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
          <button id="btnStartCamera">打开摄像头</button>
          <button id="btnStartDetect" disabled>开始实验</button>
          <button id="btnStopDetect" disabled>停止实验</button>
        </div>
        <div id="stateBox" class="status-box state-unknown">当前状态：unknown</div>
      </div>
      <div class="right">
        <div class="panel">
          <h3>实验信息</h3>
          <div id="experimentInfo" class="small">等待加载实验配置...</div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h3>得分模式</h3>
            <label class="switch-row" for="scoreModeToggle">
              <span id="scoreModeText">按顺序得分</span>
              <input id="scoreModeToggle" type="checkbox" />
            </label>
          </div>
        </div>

        <div class="panel">
          <h3>实验得分</h3>
          <div id="scoreSummary" class="score-summary">总分：0 分</div>
          <div id="scoreCards" class="score-cards"></div>
        </div>

        <div class="panel">
          <h3>检测计数</h3>
          <div id="countInfo" class="mono">等待检测...</div>
        </div>

        <div class="panel">
          <h3>得分调试信息</h3>
          <div id="debugInfo" class="mono debug-box">等待检测...</div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
